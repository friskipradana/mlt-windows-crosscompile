name: Build MLT for Windows

on:
  # Manual trigger untuk testing
  workflow_dispatch:

  # Auto trigger saat push tag
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install build tools ────────────────────────────────────────────
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            cmake make ninja-build \
            meson nasm yasm \
            pkg-config autoconf automake \
            libtool gettext gperf \
            git wget \
            librubberband-dev

      # ── 3. Cache win-deps ─────────────────────────────────────────────────
      - name: Cache win-deps
        uses: actions/cache@v4
        with:
          path: ~/tools/win-deps
          key: win-deps-${{ hashFiles('build-all.sh') }}

      # ── 4. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: |
          chmod +x build-all.sh
          ./build-all.sh

      # ── 5. Package ────────────────────────────────────────────────────────
      - name: Package release
        run: |
          mkdir -p release-output
          PREFIX="$HOME/tools/win-deps"

          cp "$PREFIX/bin/melt.exe"  release-output/
          cp "$PREFIX/bin/"*.dll     release-output/ 2>/dev/null || true
          cp -r "$PREFIX/lib/mlt"    release-output/lib-mlt   2>/dev/null || true
          cp -r "$PREFIX/share/mlt"  release-output/share-mlt 2>/dev/null || true

          cd release-output
          zip -r ../mlt-windows.zip .
          ls -lh ../mlt-windows.zip

      # ── 6. Upload artifact (manual trigger / testing) ─────────────────────
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mlt-windows
          path: mlt-windows.zip
          retention-days: 7

      # ── 7. Upload ke GitHub Releases (push tag) ───────────────────────────
      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mlt-windows.zip
          body: |
            ## MLT Windows Build ${{ github.ref_name }}
            Cross-compiled from Ubuntu using mingw-w64.

            ### Cara pakai
            1. Extract zip
            2. Jalankan `melt.exe` dari folder hasil extract

            > ⚠️ Alpha release — path `lib/mlt` dan `share/mlt`
            > mungkin perlu di-set manual via environment variable.
