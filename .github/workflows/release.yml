name: Build MLT for Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. System info
      # ─────────────────────────────────────────────
      - name: System info
        run: |
          echo "===== CPU =====" && nproc
          echo "===== RAM =====" && free -h
          echo "===== DISK ====" && df -h

      # ─────────────────────────────────────────────
      # 3. Install tools
      # ─────────────────────────────────────────────
      - name: Install build tools
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            mingw-w64 \
            cmake \
            make \
            ninja-build \
            meson \
            nasm \
            yasm \
            pkg-config \
            autoconf \
            automake \
            libtool \
            gettext \
            gperf \
            git \
            wget \
            zip \
            tree \
            python3 \
            python3-pip \
            libffi-dev \
            libglib2.0-dev

      # ─────────────────────────────────────────────
      # 4. Cache deps
      # FIX: Cache harus SEBELUM hard clean, bukan sesudah.
      # Kalau hard clean dulu, cache tidak ada gunanya sama sekali.
      # Key pakai hash build script supaya cache otomatis invalid
      # kalau scriptnya berubah.
      # ─────────────────────────────────────────────
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/win-deps
            ~/tools/src
          key: mlt-deps-v1-${{ runner.os }}-${{ hashFiles('build-all-ubuntu.sh') }}
          restore-keys: |
            mlt-deps-v1-${{ runner.os }}-

      # ─────────────────────────────────────────────
      # 5. Init dirs (hanya kalau cache miss)
      # FIX: Jangan hard clean kalau cache baru di-restore,
      # karena itu akan membuang cache yang baru saja diambil.
      # Cukup mkdir kalau folder belum ada.
      # ─────────────────────────────────────────────
      - name: Init dirs
        run: |
          mkdir -p $HOME/tools/win-deps/lib \
                   $HOME/tools/win-deps/bin \
                   $HOME/tools/win-deps/include \
                   $HOME/tools/src

      # ─────────────────────────────────────────────
      # 7. Build
      # ─────────────────────────────────────────────
      - name: Build
        run: |
          set -ex
          chmod +x build-all-ubuntu.sh
          ./build-all-ubuntu.sh

      # ─────────────────────────────────────────────
      # 7.1 Show folder structure
      # ─────────────────────────────────────────────
      - name: Show folder structure
        run: |
          echo "=== ~/tools/win-deps ==="
          tree $HOME/tools/win-deps -L 2

          echo "=== ~/tools/src ==="
          tree $HOME/tools/src -L 1

      # ─────────────────────────────────────────────
      # 8. Validate output
      # ─────────────────────────────────────────────
      - name: Validate output
        run: |
          PREFIX="$HOME/tools/win-deps"
          echo "=== Checking melt.exe ==="
          ls -lh "$PREFIX/bin/melt.exe" || { echo "❌ melt.exe NOT FOUND"; exit 1; }

          echo "=== DLLs ==="
          ls "$PREFIX/bin/"*.dll | wc -l

          echo "=== MLT modules ==="
          ls "$PREFIX/lib/mlt/"   2>/dev/null || \
          ls "$PREFIX/lib/mlt-7/" 2>/dev/null || \
          echo "WARNING: lib/mlt tidak ditemukan"

      # ─────────────────────────────────────────────
      # 8.1 Prepare raw bundle
      # ─────────────────────────────────────────────
      - name: Prepare raw bundle
        run: |
          set -ex
          PREFIX="$HOME/tools/win-deps"
          mkdir -p release-output

          # Copy everything from win-deps as full bundle
          cp -r "$PREFIX/bin"   release-output/
          cp -r "$PREFIX/lib"   release-output/
          cp -r "$PREFIX/share" release-output/
          cp -r "$PREFIX/include" release-output/
          cp -r "$PREFIX/etc"   release-output/ 2>/dev/null || true

          # Copy src as well
          cp -r "$HOME/tools/src" release-output/src

          # Folder structure log
          tree release-output -L 3 > release-output/folder-structure.txt


      # ─────────────────────────────────────────────
      # 9. Package
      # ─────────────────────────────────────────────
      - name: Package
        run: |
          set -ex
          PREFIX="$HOME/tools/win-deps"
          mkdir -p release-output

          cp "$PREFIX/bin/melt.exe"   release-output/ 2>/dev/null || true
          cp "$PREFIX/bin/"*.dll      release-output/ 2>/dev/null || true
          cp -r "$PREFIX/lib/mlt"     release-output/lib-mlt    2>/dev/null || true
          cp -r "$PREFIX/share/mlt"   release-output/share-mlt  2>/dev/null || true

          cd release-output
          zip -r ../mlt-windows.zip .
          echo "=== Package size ==="
          ls -lh ../mlt-windows.zip

      # ─────────────────────────────────────────────
      # 10. Upload artifact (manual dispatch)
      # ─────────────────────────────────────────────
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mlt-windows
          path: mlt-windows.zip

      # ─────────────────────────────────────────────
      # 11. GitHub Release (tag push)
      # ─────────────────────────────────────────────
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mlt-windows.zip
          body: |
            MLT Windows Cross Build
            - Ubuntu + MinGW-w64
            - Built from: ${{ github.sha }}