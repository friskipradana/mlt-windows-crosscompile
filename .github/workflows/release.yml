name: Build MLT for Windows

on:
  # Manual trigger untuk testing
  workflow_dispatch:

  # Auto trigger saat push tag
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      JOBS: 1
      MAKEFLAGS: -j1

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. System info ──────────────────────────────────────────
      - name: System info
        run: |
          echo "===== CPU =====" && nproc
          echo "===== RAM =====" && free -h
          echo "===== DISK ====" && df -h

      # ── 3. Install build tools ──────────────────────────────────
      - name: Install build tools
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            cmake make ninja-build \
            meson nasm yasm \
            pkg-config autoconf automake \
            libtool gettext gperf \
            git wget zip

      # ── 4. Cleanup disk ─────────────────────────────────────────
      - name: Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc || true
          df -h

      # ── 5. Cache deps ───────────────────────────────────────────
      - name: Cache build data
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/win-deps
            ~/tools/src
          key: mlt-${{ runner.os }}-${{ hashFiles('build-all.sh') }}
          restore-keys: |
            mlt-${{ runner.os }}-

      # ── 6. Build ────────────────────────────────────────────────
      - name: Build
        run: |
          set -ex
          chmod +x build-all.sh
          export JOBS=1
          export MAKEFLAGS=-j1
          ./build-all.sh

      # ── 7. Package ──────────────────────────────────────────────
      - name: Package release
        run: |
          set -ex
          mkdir -p release-output
          PREFIX="$HOME/tools/win-deps"

          cp "$PREFIX/bin/melt.exe"  release-output/
          cp "$PREFIX/bin/"*.dll     release-output/ 2>/dev/null || true
          cp -r "$PREFIX/lib/mlt"    release-output/lib-mlt   2>/dev/null || true
          cp -r "$PREFIX/share/mlt"  release-output/share-mlt 2>/dev/null || true

          cd release-output
          zip -r ../mlt-windows.zip .
          ls -lh ../mlt-windows.zip

      # ── 8. Upload artifact (manual trigger) ─────────────────────
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mlt-windows
          path: mlt-windows.zip
          retention-days: 7

      # ── 9. Upload ke GitHub Releases (push tag) ─────────────────
      - name: Upload to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mlt-windows.zip
          body: |
            ## MLT Windows Build ${{ github.ref_name }}
            Cross-compiled using mingw-w64.

            ⚠️ Alpha build:
            - Set path untuk lib/mlt & share/mlt jika diperlukan