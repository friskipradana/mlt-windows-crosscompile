name: Build MLT for Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 2. System info
      # ─────────────────────────────────────────────
      - name: System info
        run: |
          echo "===== CPU =====" && nproc
          echo "===== RAM =====" && free -h
          echo "===== DISK ====" && df -h

      # ─────────────────────────────────────────────
      # 3. Install tools
      # ─────────────────────────────────────────────
      - name: Install build tools
        run: |
          set -ex
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            mingw-w64 \
            cmake \
            make \
            ninja-build \
            meson \
            nasm \
            yasm \
            pkg-config \
            autoconf \
            automake \
            libtool \
            gettext \
            gperf \
            git \
            wget \
            zip \
            tree \
            python3 \
            python3-pip \
            libffi-dev \
            libglib2.0-dev

      # ─────────────────────────────────────────────
      # 4. Cache deps
      # FIX: Cache harus SEBELUM hard clean, bukan sesudah.
      # Kalau hard clean dulu, cache tidak ada gunanya sama sekali.
      # Key pakai hash build script supaya cache otomatis invalid
      # kalau scriptnya berubah.
      # ─────────────────────────────────────────────
      - name: Cache deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/tools/win-deps
            ~/tools/src
          key: mlt-deps-v1-${{ runner.os }}-${{ hashFiles('build-all-ubuntu.sh') }}
          restore-keys: |
            mlt-deps-v1-${{ runner.os }}-

      # ─────────────────────────────────────────────
      # 5. Init dirs (hanya kalau cache miss)
      # FIX: Jangan hard clean kalau cache baru di-restore,
      # karena itu akan membuang cache yang baru saja diambil.
      # Cukup mkdir kalau folder belum ada.
      # ─────────────────────────────────────────────
      - name: Init dirs
        run: |
          mkdir -p $HOME/tools/win-deps/lib \
                   $HOME/tools/win-deps/bin \
                   $HOME/tools/win-deps/include \
                   $HOME/tools/src

      # ─────────────────────────────────────────────
      # 7. Build
      # ─────────────────────────────────────────────
      - name: Build
        run: |
          set -ex
          chmod +x build-all-ubuntu.sh
          ./build-all-ubuntu.sh

      # ─────────────────────────────────────────────
      # 7.1 Show folder structure
      # ─────────────────────────────────────────────
      - name: Show folder structure
        run: |
          echo "=== ~/tools/ ==="
          tree $HOME/tools/ -L 1

      # ─────────────────────────────────────────────
      # 7.2 Show folder structure win-deps
      # ─────────────────────────────────────────────
      - name: Show folder structure win-deps
        run: |
          echo "=== ~/tools/win-deps ==="
          tree $HOME/tools/win-deps -L 2

      # ─────────────────────────────────────────────
      # 7.3 Show folder structure src
      # ─────────────────────────────────────────────
      - name: Show folder structure src
        run: |
          echo "=== ~/tools/src ==="
          tree $HOME/tools/src -L 1

      # ─────────────────────────────────────────────
      # 7.4 Show folder structure src/mlt-win
      # ─────────────────────────────────────────────
      - name: Show folder structure src/mlt-win
        run: |
          echo "=== ~/tools/src/mlt-win/build ==="
          tree $HOME/tools/src/mlt-win/build -L 3

      # ─────────────────────────────────────────────
      # 8. Validate output
      # ─────────────────────────────────────────────
      - name: Validate output
        run: |
          PREFIX="$HOME/tools/win-deps"
          echo "=== Checking melt.exe ==="
          ls -lh "$PREFIX/bin/melt.exe" || { echo "❌ melt.exe NOT FOUND"; exit 1; }

          echo "=== DLLs ==="
          ls "$PREFIX/bin/"*.dll | wc -l

          echo "=== MLT modules ==="
          ls "$PREFIX/lib/mlt-7/" 2>/dev/null || echo "WARNING: lib/mlt-7 tidak ditemukan"
          ls "$PREFIX/share/mlt-7/" 2>/dev/null || echo "WARNING: share/mlt-7 tidak ditemukan"


      # ─────────────────────────────────────────────
      # 9. Generate run_melt.ps1
      # ─────────────────────────────────────────────
      - name: Generate run_melt.ps1
        run: |
          cat > run_melt.ps1 << 'EOF'
          # run_melt.ps1
          $env:MLT_HOME = $PSScriptRoot

          $env:MLT_REPOSITORY    = "$env:MLT_HOME\lib\mlt-7"
          $env:MLT_DATA          = "$env:MLT_HOME\share\mlt-7"
          $env:MLT_PROFILES_PATH = "$env:MLT_HOME\share\mlt-7\profiles"

          $env:PATH = "$env:MLT_HOME\bin;$env:MLT_HOME;$env:PATH"

          Set-Location $env:MLT_HOME

          echo "" | & "$env:MLT_HOME\melt.exe" $args
          EOF
          
      # ─────────────────────────────────────────────
      # 10. Package
      # ─────────────────────────────────────────────
      - name: Package
        run: |
          set -ex

          PREFIX="$HOME/tools/win-deps"
          OUT="release-output"
          ZIP="mlt-windows.zip"

          # 🧹 CLEAN TOTAL (WAJIB)
          rm -rf "$OUT"
          rm -f "$ZIP"

          mkdir -p "$OUT/bin" "$OUT/lib/mlt-7" "$OUT/share"

          # Root: melt.exe + libmlt core DLL
          cp "$PREFIX/bin/melt.exe"        "$OUT/"
          cp "$PREFIX/bin/libmlt-7.dll"    "$OUT/"
          cp "$PREFIX/bin/libmlt++-7.dll"  "$OUT/"

          # lib/mlt-7: MLT module DLLs
          find "$PREFIX/bin" -name "libmlt*.dll" \
            ! -name "libmlt-7.dll" \
            ! -name "libmlt++-7.dll" \
            -exec cp {} "$OUT/lib/mlt-7/" \;

          # bin: semua DLL dependency lainnya
          find "$PREFIX/bin" -name "*.dll" \
            ! -name "libmlt*.dll" \
            -exec cp {} "$OUT/bin/" \;

          # share
          [ -d "$PREFIX/share/mlt-7" ] && cp -r "$PREFIX/share/mlt-7" "$OUT/share/"

          # run script
          cp run_melt.ps1 "$OUT/"

          # 🔒 EXTRA SAFETY: jangan ada zip di dalam OUT
          find "$OUT" -name "*.zip" -delete

          echo "=== Struktur output ==="
          tree "$OUT" -L 3 || true

          # 📦 ZIP TANPA NESTING
          (
            cd "$OUT"
            zip -r "../$ZIP" .
          )

          echo "=== Isi ZIP ==="
          unzip -l "$ZIP" | head -n 30

          ls -lh "$ZIP"

      # ─────────────────────────────────────────────
      # 11. Upload artifact (manual dispatch)
      # ─────────────────────────────────────────────
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mlt-windows
          path: mlt-windows.zip

      # ─────────────────────────────────────────────
      # 12. GitHub Release (tag push)
      # ─────────────────────────────────────────────
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mlt-windows.zip
          body: |
            MLT Windows Cross Build
            - Ubuntu + MinGW-w64
            - Built from: ${{ github.sha }}